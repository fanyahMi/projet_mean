# ══════════════════════════════════════════════════
#  CI Pipeline — Tests & Build automatiques
#  Déclenché à chaque push et pull request
# ══════════════════════════════════════════════════

name: CI — Tests & Build

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]
  # Permet au workflow CD d'appeler ce workflow
  workflow_call:

env:
  NODE_VERSION: '20'

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 1: Tests Backend
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  backend-tests:
    name: 🧪 Tests Backend
    runs-on: ubuntu-latest

    services:
      # MongoDB service container pour les tests
      mongo:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Installation des dépendances backend
        working-directory: backend
        run: npm ci

      - name: ✅ Vérification du chargement des modules
        working-directory: backend
        run: node -e "const c = require('./src/controllers/order.controller.js'); console.log('Controllers OK:', Object.keys(c).length, 'exports');"

      - name: 🚀 Démarrage du backend
        working-directory: backend
        run: node src/server.js &
        env:
          PORT: 5000
          MONGO_URI: mongodb://localhost:27017/mall_test_db
          JWT_SECRET: test-secret-ci-pipeline-2026
          NODE_ENV: test
          SWAGGER_ENABLED: false

      - name: ⏳ Attente que le backend soit prêt
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "✅ Backend prêt !"
              break
            fi
            echo "Attente... ($i/30)"
            sleep 2
          done

      - name: 🧪 Tests de base POS
        working-directory: backend
        run: node test-pos.js
        env:
          API_URL: http://localhost:5000/api

      - name: 🧪 Tests avancés POS (remises, TVA, monnaie, facture)
        working-directory: backend
        run: node test-pos-complete.js
        env:
          API_URL: http://localhost:5000/api

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 2: Build Frontend Angular
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  frontend-build:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📦 Installation des dépendances frontend
        run: npm ci

      - name: 🏗️ Build Angular (production)
        run: npx ng build --configuration production

      - name: 📊 Taille du build
        run: |
          echo "📦 Taille du build Angular :"
          du -sh dist/ng-tailadmin/browser/
          echo ""
          echo "📄 Fichiers principaux :"
          ls -lh dist/ng-tailadmin/browser/*.js dist/ng-tailadmin/browser/*.css 2>/dev/null || true

      - name: 💾 Sauvegarder le build (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/ng-tailadmin/browser/
          retention-days: 7

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 3: Build images Docker
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  docker-build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]  # Seulement si tests + build OK

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🐳 Build image backend
        run: docker build -t mall-backend:${{ github.sha }} ./backend

      - name: 🐳 Build image frontend
        run: docker build -t mall-frontend:${{ github.sha }} -f Dockerfile.frontend .

      - name: ✅ Vérification des images
        run: |
          echo "🐳 Images Docker construites :"
          docker images | grep mall

